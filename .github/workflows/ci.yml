name: CI - Crop Recommendation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      n_estimators:
        description: "n_estimators grid (JSON array)"
        required: false
        default: "[100, 200]"
      max_depth:
        description: "max_depth grid (JSON array, use null for None)"
        required: false
        default: "[null, 10, 20]"
      min_samples_split:
        description: "min_samples_split grid (JSON array)"
        required: false
        default: "[2, 5]"

env:
  PYTHON_VERSION: "3.10"
  DOCKER_IMAGE_NAME: crop-recommendation-model
  MLPROJECT_DIR: MLProject

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MLProject

    steps:
      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Check Env
        run: |
          echo "=============================="
          echo "  Environment Information"
          echo "=============================="
          python --version
          pip --version
          echo "Working directory: $(pwd)"
          echo "Files:"
          ls -la
          echo ""
          echo "Python path: $(which python)"
          echo "Runner OS  : ${{ runner.os }}"
          echo "Event name : ${{ github.event_name }}"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "==============================="
          echo " Installed packages:"
          pip list | grep -E "mlflow|scikit|pandas|numpy"
          echo "==============================="

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          echo "==============================="
          echo " Starting MLflow Project Run"
          echo "==============================="

          # Gunakan input dari workflow_dispatch jika ada, default jika tidak
          N_EST="${{ github.event.inputs.n_estimators || '[100, 200]' }}"
          MAX_D="${{ github.event.inputs.max_depth || '[null, 10, 20]' }}"
          MIN_S="${{ github.event.inputs.min_samples_split || '[2, 5]' }}"

          echo "n_estimators     : $N_EST"
          echo "max_depth        : $MAX_D"
          echo "min_samples_split: $MIN_S"

          mlflow run . \
            --env-manager=local \
            -P n_estimators="$N_EST" \
            -P max_depth="$MAX_D" \
            -P min_samples_split="$MIN_S" \
            -P cv_folds=5

          echo "MLflow run completed successfully."

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          echo "==============================="
          echo " Retrieving MLflow run_id"
          echo "==============================="

          # Ambil run_id dari file yang ditulis oleh modelling.py
          if [ -f "run_id.txt" ]; then
            RUN_ID=$(cat run_id.txt)
            echo "run_id from file: $RUN_ID"
          else
            # Fallback: ambil dari MLflow via Python
            RUN_ID=$(python3 - <<'PYEOF'
          import mlflow
          import os
          client = mlflow.tracking.MlflowClient()
          experiments = client.search_experiments()
          for exp in experiments:
              runs = client.search_runs(
                  experiment_ids=[exp.experiment_id],
                  order_by=["start_time DESC"],
                  max_results=1
              )
              if runs:
                  print(runs[0].info.run_id)
                  break
          PYEOF
            )
            echo "run_id from MLflow: $RUN_ID"
          fi

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Final run_id: $RUN_ID"

      - name: Install Python dependencies
        run: |
          pip install mlflow==2.12.2 scikit-learn==1.4.2
          echo "Dependencies verified for artifact packaging."

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: crop-recommendation-artifacts-${{ github.run_number }}
          path: |
            MLProject/model_output/
            MLProject/classification_report.txt
            MLProject/confusion_matrix.csv
            MLProject/run_id.txt
            MLProject/mlruns/
          retention-days: 30
          if-no-files-found: warn

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI:      ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: |
          echo "==============================="
          echo " Building Docker Image via mlflow build-docker"
          echo "==============================="

          IMAGE_TAG="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}:latest"
          echo "Image tag: $IMAGE_TAG"

          # mlflow build-docker menggunakan Dockerfile di direktori ini
          mlflow models build-docker \
            --model-uri "model_output" \
            --name "$IMAGE_TAG" \
            --env-manager local

          echo "Docker image built: $IMAGE_TAG"
          docker images | grep "${{ env.DOCKER_IMAGE_NAME }}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker Image
        run: |
          BASE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}"
          RUN_TAG="${BASE}:run-${{ github.run_number }}"
          SHA_TAG="${BASE}:sha-${{ github.sha }}"

          docker tag "${BASE}:latest" "${RUN_TAG}"
          docker tag "${BASE}:latest" "${SHA_TAG}"

          echo "Tags applied:"
          echo "  - ${BASE}:latest"
          echo "  - ${RUN_TAG}"
          echo "  - ${SHA_TAG}"

          # Simpan base tag untuk step berikutnya
          echo "DOCKER_BASE=${BASE}" >> $GITHUB_ENV
          echo "DOCKER_RUN_TAG=${RUN_TAG}" >> $GITHUB_ENV

      - name: Push Docker Image
        run: |
          echo "==============================="
          echo " Pushing Docker Image to Docker Hub"
          echo "==============================="

          docker push "${{ env.DOCKER_BASE }}:latest"
          docker push "${{ env.DOCKER_RUN_TAG }}"

          echo ""
          echo "Successfully pushed to Docker Hub:"
          echo "  ${{ env.DOCKER_BASE }}:latest"
          echo "  ${{ env.DOCKER_RUN_TAG }}"
          echo ""
          echo "Docker Hub URL:"
          echo "  https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}"
